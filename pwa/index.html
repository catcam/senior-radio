<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Senior Radio">
<meta name="theme-color" content="#0B1F4D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Senior Radio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0B1F4D;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 0;
  }
  h1 { font-size: 32px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
  .subtitle { color: #8FA0C8; font-size: 16px; margin-bottom: 48px; }
  .buttons { width: 100%; display: flex; flex-direction: column; gap: 20px; }
  .btn {
    background: #1B3A8A;
    border: none;
    border-radius: 16px;
    min-height: 120px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: background 0.15s;
    padding: 16px;
  }
  .btn.playing { background: #C0392B; }
  .btn-label { color: #fff; font-size: 44px; font-weight: 800; letter-spacing: 2px; }
  .btn-time { color: rgba(255,255,255,0.7); font-size: 18px; margin-top: 6px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-box { margin-top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; }
  .progress-track {
    width: 100%; height: 6px;
    background: #2A3F7A;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: #4A90E2; border-radius: 3px; transition: width 0.5s linear; }
  .timer { color: #8FA0C8; font-size: 14px; margin-top: 8px; }
  .offline-note { color: #E8A838; font-size: 13px; margin-top: 6px; }
  .wake-row { margin-top: 20px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8FA0C8; }
  .wake-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #4A90E2; cursor: pointer; }
</style>
</head>
<body>
<h1>Senior Radio</h1>
<p class="subtitle">HRT Radio</p>

<div class="buttons">
  <button class="btn" id="btn-vijesti" onclick="handlePress('vijesti')">
    <span class="btn-label" id="label-vijesti">VIJESTI</span>
    <span class="btn-time" id="time-vijesti"></span>
  </button>
  <button class="btn" id="btn-dnevnik" onclick="handlePress('dnevnik')">
    <span class="btn-label" id="label-dnevnik">DNEVNIK</span>
    <span class="btn-time" id="time-dnevnik"></span>
  </button>
</div>

<div class="progress-box" id="progress-box" style="display:none">
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="timer" id="timer">0:00</div>
  <div class="offline-note" id="offline-note" style="display:none">Reproducira se snimljena kopija</div>
</div>

<div class="wake-row">
  <input type="checkbox" id="wake-toggle" onchange="toggleWakeLock(this.checked)">
  <label for="wake-toggle">Drži ekran upaljen</label>
</div>

<audio id="audio" playsinline preload="none"></audio>

<script type="module">
import { fetchTrack, invalidateCache } from './scraper.js';

let playing = null;
let wakeLock = null;
const audio = document.getElementById('audio');

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('timer').textContent =
    fmt(audio.currentTime) + (audio.duration ? ' / ' + fmt(audio.duration) : '');
});

audio.addEventListener('ended', () => {
  stopAll();
});

window.handlePress = async function(slug) {
  if (playing === slug) { stopAll(); return; }
  if (playing) stopAll();

  setLoading(slug, true);
  try {
    const track = await fetchTrack(slug);
    if (track.offline) document.getElementById('offline-note').style.display = '';
    if (track.broadcastTime) document.getElementById('time-' + slug).textContent = track.broadcastTime;

    audio.src = track.url;
    audio.load();
    await audio.play();
    playing = slug;
    document.getElementById('btn-' + slug).classList.add('playing');
    document.getElementById('label-' + slug).textContent = '■ ' + slug.toUpperCase();
    document.getElementById('progress-box').style.display = '';
  } catch (err) {
    invalidateCache(slug);
    alert('Greška: ' + (err.message || 'Nepoznata greška'));
  } finally {
    setLoading(slug, false);
  }
};

function stopAll() {
  if (playing) {
    document.getElementById('btn-' + playing).classList.remove('playing');
    document.getElementById('label-' + playing).textContent = playing.toUpperCase();
  }
  audio.pause();
  audio.src = '';
  playing = null;
  document.getElementById('progress-box').style.display = 'none';
  document.getElementById('offline-note').style.display = 'none';
  releaseWakeLock();
}

function setLoading(slug, on) {
  const label = document.getElementById('label-' + slug);
  if (on) label.innerHTML = '<div class="spinner"></div>';
  else label.textContent = (playing === slug ? '■ ' : '') + slug.toUpperCase();
}

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

window.toggleWakeLock = async function(on) {
  if (on) await requestWakeLock();
  else releaseWakeLock();
};

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('wake-toggle').checked = false;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
